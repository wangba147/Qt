function renderNav(){ document.getElementById('nav').innerHTML = tabs.map((t,i)=>`<button class="tab-btn${i===0?' active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join(''); }
function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',tabs[i].id===id));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');

// ========== 内容面板 ==========
function renderPanels(){
let html='';
// --- 面板1: 概念与架构 ---
html+=`
<div class="tab-panel active" id="panel-concept">
<div class="card">
<h2>🤔 为什么需要状态机？</h2>
<p>想一想你写过的代码：网络请求在"空闲→连接中→已连接→断开"之间切换；播放器在"停止→播放→暂停→缓冲"之间流转；界面在不同模式间切换……手写 <code>if/else</code> 很容易变成意大利面条。</p>
<p><span class="tag tag-ok">状态机</span> 把系统行为建模为 <b>状态(State) + 转换(Transition)</b>，让逻辑 <b>可视化、可测试、不易出错</b>。</p>
</div>

<div class="card">
<h2>🧱 QStateMachine 体系架构</h2>
<div class="state-visual">`+renderConceptSVG()+`</div>
<table>
<tr><th>角色</th><th>类名</th><th>职责</th></tr>
<tr><td>🏭 引擎</td><td><code>QStateMachine</code></td><td>管理所有状态和转换，驱动状态切换，发出信号</td></tr>
<tr><td>📍 状态</td><td><code>QState</code></td><td>表示系统的一个状态，可嵌套子状态</td></tr>
<tr><td>🏁 终态</td><td><code>QFinalState</code></td><td>状态机的终点，到达后发送 <code>finished()</code> 信号</td></tr>
<tr><td>🔀 转换</td><td><code>QAbstractTransition</code></td><td>抽象基类，描述从一个状态到另一个状态的迁移</td></tr>
<tr><td>📶 信号转换</td><td><code>QSignalTransition</code></td><td>由 Qt 信号触发的转换（最常用）</td></tr>
<tr><td>⏱️ 超时转换</td><td><code>QTimeoutTransition*</code></td><td>Qt 6.8 新增：定时器触发转换</td></tr>
<tr><td>📋 历史状态</td><td><code>QHistoryState</code></td><td>记住"退出前的子状态"，下次回来恢复</td></tr>
</table>
</div>

<div class="card">
<h2>📦 模块与头文件</h2>
<pre><code><span class="comment">// CMakeLists.txt (Qt 6)</span>
<span class="func">find_package</span>(Qt6 <span class="macro">REQUIRED</span> COMPONENTS StateMachine)
<span class="func">target_link_libraries</span>(myapp <span class="macro">PRIVATE</span> Qt6::StateMachine)

<span class="comment">// 头文件</span>
<span class="macro">#include</span> <span class="string">&lt;QStateMachine&gt;</span>
<span class="macro">#include</span> <span class="string">&lt;QState&gt;</span>
<span class="macro">#include</span> <span class="string">&lt;QFinalState&gt;</span>
<span class="macro">#include</span> <span class="string">&lt;QSignalTransition&gt;</span>
<span class="macro">#include</span> <span class="string">&lt;QHistoryState&gt;</span>

<span class="comment">// Qt 5: 无需额外模块，Qt5::Core 自带</span></code></pre>
<div class="footnote"><strong>Qt 6 注意：</strong>QStateMachine 从 QtCore 移到了独立模块 <code>Qt6StateMachine</code>（Qt 6.0~6.7: 需要单独链接; Qt 6.8+: 回归 QtCore）。如果你的 Qt 版本 &lt; 6.8，记得 <code>find_package(Qt6 REQUIRED COMPONENTS StateMachine)</code>。</div>
</div>
</div>`;

// --- 面板2: 基础用法 ---
html+=`
<div class="tab-panel" id="panel-basic">
<div class="card">
<h2>📝 最小示例：红绿灯状态机</h2>
<p>用 QStateMachine 建模一个经典的红绿灯循环：<b>红 → 绿 → 黄 → 红 → …</b></p>
<pre><code><span class="macro">#include</span> <span class="string">&lt;QStateMachine&gt;</span>
<span class="macro">#include</span> <span class="string">&lt;QState&gt;</span>
<span class="macro">#include</span> <span class="string">&lt;QFinalState&gt;</span>

<span class="comment">// 创建状态机</span>
<span class="type">QStateMachine</span> *machine = <span class="keyword">new</span> <span class="type">QStateMachine</span>(<span class="keyword">this</span>);

<span class="comment">// 定义状态</span>
<span class="type">QState</span> *red    = <span class="keyword">new</span> <span class="type">QState</span>();
<span class="type">QState</span> *green  = <span class="keyword">new</span> <span class="type">QState</span>();
<span class="type">QState</span> *yellow = <span class="keyword">new</span> <span class="type">QState</span>();
<span class="type">QFinalState</span> *done  = <span class="keyword">new</span> <span class="type">QFinalState</span>();

<span class="comment">// 状态进入/退出时做事情</span>
red<span class="func">->assignProperty</span>(ui->label, <span class="string">"text"</span>, <span class="string">"🔴 红灯 — 停车"</span>);
green<span class="func">->assignProperty</span>(ui->label, <span class="string">"text"</span>, <span class="string">"🟢 绿灯 — 通行"</span>);
yellow<span class="func">->assignProperty</span>(ui->label, <span class="string">"text"</span>, <span class="string">"🟡 黄灯 — 减速"</span>);

<span class="comment">// 定义转换：信号触发</span>
red<span class="func">->addTransition</span>(ui->btnNext, &<span class="type">QPushButton</span>::clicked, green);
green<span class="func">->addTransition</span>(ui->btnNext, &<span class="type">QPushButton</span>::clicked, yellow);
yellow<span class="func">->addTransition</span>(ui->btnNext, &<span class="type">QPushButton</span>::clicked, red);

<span class="comment">// 或转换成终态（停止状态机）</span>
yellow<span class="func">->addTransition</span>(ui->btnStop, &<span class="type">QPushButton</span>::clicked, done);

<span class="comment">// 添加状态到状态机，设置初始状态</span>
machine<span class="func">->addState</span>(red);
machine<span class="func">->addState</span>(green);
machine<span class="func">->addState</span>(yellow);
machine<span class="func">->addState</span>(done);
machine<span class="func">->setInitialState</span>(red);

<span class="comment">// 启动！</span>
machine<span class="func">->start</span>();</code></pre>
</div>

<div class="card">
<h2>🎮 实时演示：红绿灯状态机</h2>
<div class="interactive-demo" id="trafficLightDemo">
<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center;">
  <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
    <div style="font-size:2.5em;" id="lightIcon">🔴</div>
    <div id="lightText" style="color:var(--accent);font-weight:600;">红灯</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;">
    <button class="demo-btn" onclick="tlNext()">▶ 下一个状态 (模拟 clicked)</button>
    <button class="demo-btn" onclick="tlReset()">🔄 重置</button>
    <div style="font-size:0.78em;color:var(--text2);margin-top:4px;">当前状态: <span id="tlState" style="color:var(--purple);"></span></div>
    <div style="font-size:0.78em;color:var(--text2);">转换次数: <span id="tlCount">0</span></div>
  </div>
</div>
</div>
</div>

<div class="card">
<h2>👶 嵌套状态（子状态机）</h2>
<p>QState 天然支持嵌套——设置 <code>childMode</code> 即可在状态内部定义子状态机：</p>
<pre><code><span class="comment">// 播放器 "播放中" 状态包含三个子状态</span>
<span class="type">QState</span> *playing = <span class="keyword">new</span> <span class="type">QState</span>(QState::<span class="keyword">ExclusiveStates</span>);
<span class="type">QState</span> *playingPaused  = <span class="keyword">new</span> <span class="type">QState</span>(playing);
<span class="type">QState</span> *playingBuffering = <span class="keyword">new</span> <span class="type">QState</span>(playing);
<span class="type">QState</span> *playingActive   = <span class="keyword">new</span> <span class="type">QState</span>(playing);
playing<span class="func">->setInitialState</span>(playingActive);

<span class="comment">// 子状态间转换</span>
playingActive<span class="func">->addTransition</span>(signal_buffering, playingBuffering);
playingBuffering<span class="func">->addTransition</span>(signal_ready, playingActive);</code></pre>
<div class="tip-box"><strong>关键概念：</strong>嵌套状态的 <code>childMode</code> 有两种——<code>ExclusiveStates</code>（互斥，同一时间只有一个子状态活跃）和 <code>ParallelStates</code>（并行，所有子状态同时活跃，见后面"并行状态"标签页）。</div>
</div>
</div>`;

// --- 面板3: 信号转换 ---
html+=`
<div class="tab-panel" id="panel-signal">
<div class="card">
<h2>📶 QSignalTransition — 最灵活的转换方式</h2>
<p>QStateMachine 的核心魅力在于：<b>转换不只是"点击按钮"，而是任何 Qt 信号都可以触发</b>。</p>
</div>

<div class="card">
<h2>🪝 三种创建信号转换的方式</h2>
<table>
<tr><th>方式</th><th>示例</th><th>适用场景</th></tr>
<tr>
  <td><b>1. addTransition 快捷版</b></td>
  <td><code>s1->addTransition(btn, &QPushButton::clicked, s2);</code></td>
  <td>简单场景，信号直接映射到目标状态</td>
</tr>
<tr>
  <td><b>2. QSignalTransition 对象</b></td>
  <td><code>QSignalTransition *t = new QSignalTransition(sender, SIGNAL(xxx));</code></td>
  <td>需要额外逻辑（动画、条件判断）</td>
</tr>
<tr>
  <td><b>3. 事件转换</b></td>
  <td><code>QEventTransition</code>（继承 QAbstractTransition）</td>
  <td>由 QEvent 触发（如键盘事件）</td>
</tr>
</table>
</div>

<div class="card">
<h2>✍️ 实战：带条件的状态转换</h2>
<pre><code><span class="comment">// 自定义转换类：校验通过才能跳转</span>
<span class="keyword">class</span> <span class="type">ValidatedTransition</span> : <span class="keyword">public</span> <span class="type">QSignalTransition</span>
{
<span class="keyword">public</span>:
    <span class="func">ValidatedTransition</span>(<span class="type">QObject</span> *sender, <span class="keyword">const char</span> *signal,
                        <span class="type">QState</span> *target)
        : <span class="func">QSignalTransition</span>(sender, signal) {
        <span class="func">setTargetState</span>(target);
    }

<span class="keyword">protected</span>:
    <span class="keyword">bool</span> <span class="func">eventTest</span>(<span class="type">QEvent</span> *e) <span class="keyword">override</span> {
        <span class="comment">// 只有数据有效时才允许转换</span>
        <span class="keyword">if</span> (!<span class="type">QSignalTransition</span>::<span class="func">eventTest</span>(e))
            <span class="keyword">return</span> <span class="keyword">false</span>;
        <span class="keyword">return</span> m_validator.<span class="func">validate</span>(m_data);
    }

    <span class="keyword">void</span> <span class="func">onTransition</span>(<span class="type">QEvent</span> *e) <span class="keyword">override</span> {
        <span class="comment">// 转换发生时做清理/日志等额外操作</span>
        <span class="func">qDebug</span>() << <span class="string">"Transition validated!"</span>;
        m_data.<span class="func">clear</span>();
    }

<span class="keyword">private</span>:
    <span class="type">Validator</span> m_validator;
    <span class="type">Data</span> m_data;
};

<span class="comment">// 使用</span>
<span class="type">ValidatedTransition</span> *vt = <span class="keyword">new</span> <span class="type">ValidatedTransition</span>(
    ui->btnSubmit, <span class="macro">SIGNAL</span>(<span class="func">clicked</span>()), stateSubmitted);
idle<span class="func">->addTransition</span>(vt);</code></pre>
</div>

<div class="card">
<h2>🎯 信号参数传递</h2>
<p>QSignalTransition 的 <code>senderSignalIndex()</code> 可以拿到信号参数。再结合 <code>eventTest(QEvent*)</code> 中访问 <code>QStateMachine::SignalEvent</code>：</p>
<pre><code><span class="keyword">bool</span> <span class="func">eventTest</span>(<span class="type">QEvent</span> *e) <span class="keyword">override</span> {
    <span class="type">QStateMachine::SignalEvent</span> *se =
        <span class="keyword">static_cast</span>&lt;<span class="type">QStateMachine::SignalEvent</span>*&gt;(e);
    <span class="type">QVariantList</span> args = se<span class="func">->arguments</span>();
    <span class="keyword">int</span> value = args.<span class="func">at</span>(<span class="num">0</span>).<span class="func">toInt</span>();
    <span class="keyword">return</span> value > <span class="num">0</span>;  <span class="comment">// 只有正数才允许转换</span>
}</code></pre>
</div>

<div class="card">
<h2>🎬 状态动画（进入/退出效果）</h2>
<p>在状态的 <code>onEntry()</code> 和 <code>onExit()</code> 中驱动 QPropertyAnimation：</p>
<pre><code><span class="comment">// 连接状态的 entered/exited 信号</span>
<span class="func">connect</span>(stateVisible, &<span class="type">QState</span>::entered, [widget]() {
    <span class="type">QPropertyAnimation</span> *anim = <span class="keyword">new</span> <span class="type">QPropertyAnimation</span>(widget, <span class="string">"opacity"</span>);
    anim<span class="func">->setDuration</span>(<span class="num">300</span>);
    anim<span class="func">->setStartValue</span>(<span class="num">0.0</span>);
    anim<span class="func">->setEndValue</span>(<span class="num">1.0</span>);
    anim<span class="func">->start</span>(<span class="type">QAbstractAnimation</span>::DeleteWhenStopped);
});
<span class="func">connect</span>(stateVisible, &<span class="type">QState</span>::exited, [widget]() {
    widget<span class="func">->hide</span>();
});</code></pre>
</div>
</div>`;

<div class="tab-panel" id="panel-parallel">
<div class="card">
<h2>⚡ QState::ParallelStates — 一个状态的多个"维度"同时运行</h2>
<p>有时一个系统有<b>多个互不干扰的状态维度</b>。比如一个网络客户端同时有：</p>
<ul>
  <li><b>连接状态：</b>未连接 / 连接中 / 已连接 / 断开</li>
  <li><b>认证状态：</b>未登录 / 登录中 / 已登录 / 过期</li>
</ul>
<p>这两个维度 <b>并行独立</b>，用嵌套互斥状态就太复杂了。这就是 <code>ParallelStates</code> 的用武之地。</p>
</div>

<div class="card">
<h2>📐 并行状态架构图</h2>
<div class="state-visual">`+renderParallelSVG()+`</div>
</div>

<div class="card">
<h2>💻 代码示例：网络客户端</h2>
<pre><code><span class="comment">// 根状态：并行模式——连接与认证两个维度同时管理</span>
<span class="type">QState</span> *root = <span class="keyword">new</span> <span class="type">QState</span>(QState::<span class="keyword">ParallelStates</span>);

<span class="comment">// ====== 维度1：连接状态组 ======</span>
<span class="type">QState</span> *connGroup = <span class="keyword">new</span> <span class="type">QState</span>(root);
<span class="type">QState</span> *sDisconnected = <span class="keyword">new</span> <span class="type">QState</span>(connGroup);
<span class="type">QState</span> *sConnecting    = <span class="keyword">new</span> <span class="type">QState</span>(connGroup);
<span class="type">QState</span> *sConnected    = <span class="keyword">new</span> <span class="type">QState</span>(connGroup);
connGroup<span class="func">->setInitialState</span>(sDisconnected);

sDisconnected<span class="func">->addTransition</span>(... /* 开始连接 */, sConnecting);
sConnecting<span class="func">->addTransition</span>(... /* 连接成功 */, sConnected);
sConnected<span class="func">->addTransition</span>(... /* 断开 */, sDisconnected);

<span class="comment">// ====== 维度2：认证状态组 ======</span>
<span class="type">QState</span> *authGroup = <span class="keyword">new</span> <span class="type">QState</span>(root);
<span class="type">QState</span> *sAnonymous = <span class="keyword">new</span> <span class="type">QState</span>(authGroup);
<span class="type">QState</span> *sLoggingIn = <span class="keyword">new</span> <span class="type">QState</span>(authGroup);
<span class="type">QState</span> *sLoggedIn  = <span class="keyword">new</span> <span class="type">QState</span>(authGroup);
authGroup<span class="func">->setInitialState</span>(sAnonymous);

<span class="comment">// 此时机器可能处于 "已连接 + 未登录" 或 "已连接 + 已登录" 等组合</span></code></pre>
<div class="tip-box"><strong>技巧：</strong>并行状态的子状态都必须是 <code>ExclusiveStates</code>（默认）。但不同并行分组之间可以互相监听对方的 <code>entered/exited</code> 信号来实现跨维度协调。</div>
</div>
</div>`;

// --- 面板7: 避坑与最佳实践 ---
html+=`
<div class="tab-panel" id="panel-pitfalls">
<div class="card">
<h2>🚨 7 个经典避坑要点</h2>
<ol>
<li><b><span class="tag tag-err">坑1</span> 忘记 start()</b><br>
创建了状态机但忘记调用 <code>start()</code>——状态机不会自动运行。这是最常见的初学者错误。
</li>
<li style="margin-top:10px;"><b><span class="tag tag-err">坑2</span> 生命周期管理</b><br>
QStateMachine 继承自 QObject，可以用 <code>parent</code> 管理。但是所有状态 <b>必须在 start() 之前添加</b>。启动后动态 add/remove 状态行为未定义（Qt 6.8 改善但建议避免）。</li>
<li style="margin-top:10px;"><b><span class="tag tag-err">坑3</span> assignProperty 只设置一次</b><br>
<code>assignProperty</code> 的值在 <b>编译期确定</b>，无法绑定时变表达式。如果需要动态值，用 <code>connect(state, &QState::entered, [this]{ … });</code></li>
<li style="margin-top:10px;"><b><span class="tag tag-err">坑4</span> 信号转换的线程安全</b><br>
QStateMachine 默认在主线程的事件循环中运行。如果在子线程发出信号触发转换，行为是 <b>线程安全的</b>（信号入队），但不要在子线程直接操作状态机 API。</li>
<li style="margin-top:10px;"><b><span class="tag tag-err">坑5</span> 过度设计</b><br>
不是所有逻辑都需要状态机。简单的 2-3 个状态的 UI 切换用 if/else 更直观。状态机适合 <b>状态≥5 且有复杂转换规则</b> 的场景。</li>
<li style="margin-top:10px;"><b><span class="tag tag-err">坑6</span> 嵌套状态 finished 信号的传播</b><br>
当一个嵌套状态（父状态）的所有子状态都完成（进入 FinalState），父状态会发出 <code>finished()</code>。可以利用这个信号触发向上跳出。</li>
<li style="margin-top:10px;"><b><span class="tag tag-err">坑7</span> Qt 6 模块分离</b><br>
Qt 6.0~6.7 需要 <code>find_package(Qt6 COMPONENTS StateMachine)</code>，Qt 6.8+ 回归 Core。如果 CMake 配置不对会报 "Unknown module"。</li>
</ol>
</div>

<div class="card">
<h2>✅ 8 条最佳实践</h2>
<ol>
<li><b>先画图，再写代码。</b>在白板或 draw.io 上画出状态图，它比代码更直观。</li>
<li><b>给状态起有意义的名字。</b><code>s1/s2/s3</code> 不如 <code>idle/connecting/connected</code>。</li>
<li><b>用 assignProperty 解耦 UI。</b>状态只设置属性值，不知道 UI 细节。</li>
<li><b>复杂条件用 eventTest，不过度继承。</b>优先在 Lambda 中处理，保持状态图清晰。</li>
<li><b>配合 Q_PROPERTY + QBindable。</b>Qt 6 的属性绑定系统和状态机是天作之合。</li>
<li><b>QFinalState 放在嵌套状态内。</b>让子状态机自己决定何时"完成"。</li>
<li><b>善用 entered/exited 信号做副作用。</b>日志、统计、UI 过渡动画都接在这里。</li>
<li><b>不要滥用 assignProperty 修改多个对象。</b>如果需要修改多个属性，用 <code>entered</code> 信号连接一个槽函数统一处理。</li>
</ol>
</div>

<div class="card">
<h2>🔗 与已学主题联动</h2>
<table>
<tr><th>已学主题</th><th>与 QStateMachine 的关系</th></tr>
<tr><td>QObject</td><td>QStateMachine 是 QObject 子类，状态生命周期靠对象树管理</td></tr>
<tr><td>QProperty / QBindable</td><td>assignProperty 核心机制；可绑定属性实现响应式状态切换</td></tr>
<tr><td>QEventLoop</td><td>状态机内部依赖事件循环处理转换事件</td></tr>
<tr><td>QSignalMapper (遗留)</td><td>旧式多路信号管理——状态机用状态图替代了这种模式</td></tr>
<tr><td>QTimer</td><td>可配合 QTimeoutTransition（Qt 6.8+）实现定时转换</td></tr>
</table>
</div>

<div class="card">
<h2>🎯 适用场景速查</h2>
<table>
<tr><th>场景</th><th>推荐度</th><th>理由</th></tr>
<tr><td>多步骤向导 (Wizard)</td><td><span class="tag tag-ok">★★★★★</span></td><td>每步有明确的前进/后退规则</td></tr>
<tr><td>网络连接管理</td><td><span class="tag tag-ok">★★★★★</span></td><td>连接状态+认证状态天然适合并行状态</td></tr>
<tr><td>播放器控制</td><td><span class="tag tag-ok">★★★★☆</span></td><td>播放/暂停/缓冲/停止/错误 状态清晰</td></tr>
<tr><td>游戏 NPC AI</td><td><span class="tag tag-ok">★★★★☆</span></td><td>巡逻/追击/战斗/死亡 状态转移</td></tr>
<tr><td>表单验证</td><td><span class="tag tag-info">★★★☆☆</span></td><td>简单表单用 if/else 即可</td></tr>
<tr><td>简单的 toggle 开关</td><td><span class="tag tag-warn">★☆☆☆☆</span></td><td>过度设计——用 bool 变量就行</td></tr>
</table>
</div>
</div>`;

return html;

// ========== 交互演示逻辑 ==========

// 红绿灯演示
let tlStates = ['red','green','yellow'];
let tlIcons = {red:'🔴',green:'🟢',yellow:'🟡'};
let tlNames = {red:'红灯 — 停车',green:'绿灯 — 通行',yellow:'黄灯 — 减速'};
let tlColors = {red:'#f85149',green:'#3fb950',yellow:'#d2991d'};
let tlIdx = 0;
let tlCount = 0;
function tlUpdate(){
  let s = tlStates[tlIdx];
  document.getElementById('lightIcon').textContent = tlIcons[s];
  document.getElementById('lightText').textContent = tlNames[s];
  document.getElementById('lightText').style.color = tlColors[s];
  document.getElementById('tlState').textContent = s;
  document.getElementById('tlCount').textContent = tlCount;
}
function tlNext(){ tlIdx = (tlIdx+1)%3; tlCount++; tlUpdate(); }
function tlReset(){ tlIdx=0; tlCount=0; tlUpdate(); }

// 历史状态演示
let hCurrent = 'home';
let hInSettings = false;
function hUpdateDisplay(){
  ['Home','Search','Profile'].forEach(k=>{
    let el = k==='Home'?document.getElementById('hActive'):
             k==='Search'?document.getElementById('hOther1'):
             document.getElementById('hOther2');
    if(!el) return;
    el.className = 'demo-state '+(hCurrent===k.toLowerCase()&&!hInSettings?'state-active':'state-idle');
  });
  document.getElementById('hBackBtn').disabled = !hInSettings;
  let msg = hInSettings ? '📂 当前在设置页中...' : `📍 当前在主页 — ${hCurrent} 标签`;
  document.getElementById('hMsg').textContent = msg;
}
function hSwitch(tab){
  if(hInSettings) return;
  hCurrent = tab;
  hUpdateDisplay();
  document.getElementById('hMsg').textContent = `✅ 已切换到 ${tab} 标签（记住此位置）`;
}
function hGoSettings(){
  hInSettings = true;
  hUpdateDisplay();
  document.getElementById('hMsg').textContent = '⚙ 进入设置页 — 主界面子状态被 HistoryState 记住...';
}
function hGoBack(){
  hInSettings = false;
  hUpdateDisplay();
  document.getElementById('hMsg').textContent = `↩ 通过 HistoryState 回到 "主页 → ${hCurrent}" 标签 ✓`;
}

// ========== 初始化 ==========
renderNav();
document.getElementById('content').innerHTML = renderPanels();
tlUpdate();
hUpdateDisplay();
</script>
