<div style="display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px;" id="tabBar">

</div>

<div id="tabContent" style="min-height: 360px;"></div>
</div>

<script>
const tabs = [];

tabs[0] = function() {
  return `
  <div style="font-size: 13px; line-height: 1.7;">
    <h2 style="font-size: 14px; font-weight: 500; margin: 0 0 12px 0;">类继承体系</h2>

      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;├── <span style="color: #3B6D11;">QVariantAnimation</span> &nbsp;<span class="tag tag-gui">通用值动画</span><br>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;├── <span style="color: #854F0B;">QAnimationGroup</span> &nbsp;<span class="tag tag-widget">抽象组</span><br>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;│&nbsp;&nbsp;&nbsp;├── <span style="color: #854F0B;">QSequentialAnimationGroup</span> &nbsp;<span class="tag tag-widget">串行</span><br>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;│&nbsp;&nbsp;&nbsp;└── <span style="color: #854F0B;">QParallelAnimationGroup</span> &nbsp;<span class="tag tag-widget">并行</span><br>

    <p style="color: #5f5e5a; margin: 0 0 12px 0;">
      Qt 动画框架的核心是 <strong>属性驱动</strong>：你指定一个 QObject 的某个属性（如 <code>pos</code>、<code>geometry</code>、<code>windowOpacity</code>），

        <p style="font-weight: 500; font-size: 13px; margin: 0 0 4px 0;">QPropertyAnimation</p>

        <span style="color: #5f5e5a;">─resume()→</span>
        <span style="background: #E1F5EE; padding: 4px 10px; border-radius: 6px; border: 0.5px solid #9FE1CB; font-weight: 500; color: #0F6E56;">Running</span>
      </div>
      <p style="color: #5f5e5a; margin: 8px 0 0 0;">Running/Paused 均可 → stop() 回到 Stopped。自然播放完毕也回到 Stopped 并发射 finished()。</p>
    </div>

    <h2 style="font-size: 14px; font-weight: 500; margin: 16px 0 8px 0;">动画 vs 定时器 vs 状态机</h2>
    <table style="width: 100%; font-size: 12px; border-collapse: collapse; margin-bottom: 8px;">
      <tr style="border-bottom: 0.5px solid #d3d1c7;">
        <th style="text-align: left; padding: 6px 8px; font-weight: 500; color: #5f5e5a;">方案</th>
        <th style="text-align: left; padding: 6px 8px; font-weight: 500; color: #5f5e5a;">适用场景</th>
        <th style="text-align: left; padding: 6px 8px; font-weight: 500; color: #5f5e5a;">优势</th>
        <th style="text-align: left; padding: 6px 8px; font-weight: 500; color: #5f5e5a;">劣势</th>
      </tr>
      <tr style="border-bottom: 0.5px solid #e8e8e8;">
        <td style="padding: 6px 8px;"><code>QPropertyAnimation</code></td>
        <td style="padding: 6px 8px;">属性平滑过渡</td>
        <td style="padding: 6px 8px;">声明式、缓动曲线、自动插值</td>
        <td style="padding: 6px 8px;">仅限 Q_PROPERTY</td>
      </tr>
      <tr style="border-bottom: 0.5px solid #e8e8e8;">
        <td style="padding: 6px 8px;"><code>QTimer</code></td>
        <td style="padding: 6px 8px;">自定义帧逻辑</td>
        <td style="padding: 6px 8px;">完全自由</td>
        <td style="padding: 6px 8px;">手动计算插值、无缓动</td>

      <tr>
        <td style="padding: 6px 8px;"><code>QStateMachine</code></td>
        <td style="padding: 6px 8px;">状态间切换</td>
        <td style="padding: 6px 8px;">状态机完整建模</td>
        <td style="padding: 6px 8px;">复杂、不直接做动画</td>

    </table>
    <p style="font-size: 12px; color: #5f5e5a; margin: 0;">三者可组合：QStateMachine 的状态进入/退出可触发 QPropertyAnimation。</p>
  </div>`;
};

    </div>

    <h2 style="font-size: 14px; font-weight: 500; margin: 16px 0 8px 0;">自定义属性动画示例</h2>
    <pre>// 头文件
class Gauge : public QWidget {
    Q_OBJECT
    Q_PROPERTY(qreal value READ value WRITE setValue NOTIFY valueChanged)
public:
    qreal value() const { return m_value; }
    void setValue(qreal v) {
        if (qFuzzyCompare(m_value, v)) return;
        m_value = v;
        update();        // 触发重绘
        emit valueChanged(v);
    }
signals:
    void valueChanged(qreal);
private:
    qreal m_value = 0;
};

auto *anim = new QPropertyAnimation(gauge, "value");

tabs[3] = function() {

  <div style="font-size: 13px; line-height: 1.7;">
    <h2 style="font-size: 14px; font-weight: 500; margin: 0 0 8px 0;">QSequentialAnimationGroup — 串行动画组</h2>
    <p style="color: #5f5e5a; margin: 0 0 8px 0;">子动画依次执行。总时长 = 所有子动画时长之和。用 QPauseAnimation 插入等待间隔。</p>
    <pre>auto *group = new QSequentialAnimationGroup;

// 第一步：移动
auto *moveAnim = new QPropertyAnimation(widget, "pos");
moveAnim-&gt;setStartValue(QPoint(0, 0));
moveAnim-&gt;setEndValue(QPoint(200, 0));
moveAnim-&gt;setDuration(500);
group-&gt;addAnimation(moveAnim);

// 等待 300ms
group-&gt;addPause(300);

// 第二步：放大
auto *scaleAnim = new QPropertyAnimation(widget, "geometry");
scaleAnim-&gt;setStartValue(QRect(200, 0, 60, 40));
scaleAnim-&gt;setEndValue(QRect(200, 0, 180, 120));
scaleAnim-&gt;setDuration(400);
group-&gt;addAnimation(scaleAnim);

group-&gt;start();</pre>

    <h2 style="font-size: 14px; font-weight: 500; margin: 16px 0 8px 0;">QParallelAnimationGroup — 并行动画组</h2>
    <p style="color: #5f5e5a; margin: 0 0 8px 0;">子动画同时执行。总时长 = 最长子动画的时长。</p>
    <pre>auto *group = new QParallelAnimationGroup;

// 同时：移动 + 透明度渐变
auto *move = new QPropertyAnimation(widget, "pos");
move-&gt;setStartValue(QPoint(0, 100));
move-&gt;setEndValue(QPoint(300, 100));

let demoAnimId = null;
function resetDemoAnim() {
  if (demoAnimId) cancelAnimationFrame(demoAnimId);
  const box = document.getElementById('demoBox');
  if (!box) return;
  box.style.left = '8px'; box.style.top = '10px';
  box.style.width = '60px'; box.style.height = '36px';
  box.style.opacity = '1'; box.style.transition = 'none';
}

function runDemoAnim(type) {
  if (demoAnimId) cancelAnimationFrame(demoAnimId);
  const box = document.getElementById('demoBox');
  if (!box) return;
  resetDemoAnim();
  const duration = parseInt(document.getElementById('demoDuration').value);
  const easingFn = getEasingFunction(document.getElementById('demoEasing').value);
  const start = performance.now();
  function tick(now) {
    let t = Math.min((now - start) / duration, 1);
    const p = easingFn(t);
    if (type === 'pos') box.style.left = (8 + p * 550) + 'px';
    else if (type === 'size') { box.style.width = (60 + p * 160) + 'px'; box.style.height = (36 + p * 60) + 'px'; }
    else if (type === 'opacity') box.style.opacity = (1 - p * 0.85).toFixed(2);
    if (t < 1) demoAnimId = requestAnimationFrame(tick);
  }
  demoAnimId = requestAnimationFrame(tick);
}

function getEasingFunction(name) {
  const fns = {
    linear: t => t,
    easeIn: t => t * t * t,
    easeOut: t => 1 - Math.pow(1 - t, 3),
    easeInOut: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
    inElastic: t => t === 0 ? 0 : t === 1 ? 1 : -Math.pow(2, 10 * t - 10) * Math.sin((t * 10 - 10.75) * 2 * Math.PI / 3),
    outElastic: t => t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * 2 * Math.PI / 3) + 1,
    inOutElastic: t => t === 0 ? 0 : t === 1 ? 1 : t < 0.5 ? -(Math.pow(2, 20 * t - 10) * Math.sin((20 * t - 11.125) * 2 * Math.PI / 4.5)) / 2 : Math.pow(2, -20 * t + 10) * Math.sin((20 * t - 11.125) * 2 * Math.PI / 4.5) / 2 + 1,
    inBack: t => { const s = 1.70158; return t * t * ((s + 1) * t - s); },
    outBack: t => { const s = 1.70158; return 1 + (t - 1) * (t - 1) * ((s + 1) * (t - 1) + s); },
    inOutBack: t => { const s = 1.70158 * 1.525; return t < 0.5 ? (t * 2) * (t * 2) * ((s + 1) * 2 * t - s) / 2 : ((t * 2 - 2) * (t * 2 - 2) * ((s + 1) * (t * 2 - 2) + s) + 2) / 2; },
    inBounce: t => 1 - getEasingFunction('outBounce')(1 - t),
    outBounce: t => { const n1 = 7.5625, d1 = 2.75; if (t < 1/d1) return n1*t*t; else if (t < 2/d1) return n1*(t-=1.5/d1)*t+0.75; else if (t < 2.5/d1) return n1*(t-=2.25/d1)*t+0.9375; else return n1*(t-=2.625/d1)*t+0.984375; },
    inOutBounce: t => t < 0.5 ? (1 - getEasingFunction('outBounce')(1 - 2*t)) / 2 : (1 + getEasingFunction('outBounce')(2*t - 1)) / 2,
    inSine: t => 1 - Math.cos(t * Math.PI / 2),
    outSine: t => Math.sin(t * Math.PI / 2),
    inOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,
    inCubic: t => t * t * t,
    outCubic: t => 1 - Math.pow(1 - t, 3),
    inOutCubic: t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2,
    inCirc: t => 1 - Math.sqrt(1 - t * t),
    outCirc: t => Math.sqrt(1 - (t - 1) * (t - 1)),
    inOutCirc: t => t < 0.5 ? (1 - Math.sqrt(1 - Math.pow(2*t,2))) / 2 : (Math.sqrt(1 - Math.pow(-2*t+2,2)) + 1) / 2,
  };
  return fns[name] || fns.linear;
}

function drawEasing() {
  const canvas = document.getElementById('easingCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const name = document.getElementById('easingSelect').value;
  const fn = getEasingFunction(name);
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, w, h);
  const pad = 30, gw = w - pad * 2, gh = h - pad * 2;
  ctx.strokeStyle = '#E8E8E8'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad + gh * i / 4;
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(pad + gw, y); ctx.stroke();
    const x = pad + gw * i / 4;
    ctx.beginPath(); ctx.moveTo(x, pad); ctx.lineTo(x, pad + gh); ctx.stroke();
  }
  ctx.fillStyle = '#888'; ctx.font = '10px sans-serif';
  ctx.fillText('0', pad - 10, pad + gh + 12);
  ctx.fillText('1', pad + gw - 2, pad + gh + 12);
  ctx.fillText('0', pad - 16, pad + gh + 4);
  ctx.fillText('1', pad - 16, pad + 4);
  ctx.strokeStyle = '#D3D1C7'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(pad, pad + gh); ctx.lineTo(pad + gw, pad); ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle = '#378ADD'; ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i <= 200; i++) {
    const t = i / 200; const v = fn(t);
    const x = pad + t * gw; const y = pad + gh - v * gh;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.fillStyle = '#378ADD'; ctx.font = '11px sans-serif';
  ctx.fillText(name, pad + 4, pad - 8);
}

function playEasingDemo() {
  const ball = document.getElementById('easingBall');
  if (!ball) return;
  const fn = getEasingFunction(document.getElementById('easingSelect').value);
  const duration = 1000;
  const start = performance.now();
  const parentW = ball.parentElement.offsetWidth - 32;
  function tick(now) {
    let t = Math.min((now - start) / duration, 1);
    ball.style.marginLeft = (8 + fn(t) * parentW) + 'px';
    if (t < 1) requestAnimationFrame(tick);
  }
  ball.style.marginLeft = '8px';
  requestAnimationFrame(tick);
}

let groupAnimId = null;
function runGroupDemo() {
  if (groupAnimId) cancelAnimationFrame(groupAnimId);
  const seqA = document.getElementById('seqA');
  const parA = document.getElementById('parA');
  const parB = document.getElementById('parB');
  if (!seqA || !parA) return;
  seqA.style.left = '4px'; parA.style.left = '4px'; parB.style.left = '4px';
  const seqDur = 1500;
  const ease = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
  const start = performance.now();
  function tick(now) {
    const t = Math.min((now - start) / seqDur, 1);
    if (t < 0.5) { const p = ease(t * 2); seqA.style.left = (4 + p * 180) + 'px'; }
    else { seqA.style.left = '184px'; }
    const p = ease(Math.min(t * 2, 1));
    parA.style.left = (4 + p * 180) + 'px';
    parB.style.left = (4 + p * 130) + 'px';
    if (t < 1) groupAnimId = requestAnimationFrame(tick);
  }
  groupAnimId = requestAnimationFrame(tick);
}
</script>
